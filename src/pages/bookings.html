<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bookings</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="../css/global.css" />
  </head>
  <body>
    <div id="app-header"></div>
    <main class="container py-5">
      <h1>Bookings</h1>
      <p id="booking-page-note" class="text-secondary mb-0">Select a hotel to continue</p>

      <div id="booking-alert" class="mt-3"></div>

      <form id="booking-form" class="mt-4" novalidate>
        <div class="row g-3">
          <div class="col-12">
            <label for="hotel-select" class="form-label">Hotel</label>
            <select id="hotel-select" name="hotel_id" class="form-select" required></select>
          </div>

          <div class="col-12 col-md-6">
            <label for="start-date" class="form-label">Start date</label>
            <input id="start-date" name="start_date" type="date" class="form-control" required />
          </div>

          <div class="col-12 col-md-6">
            <label for="end-date" class="form-label">End date</label>
            <input id="end-date" name="end_date" type="date" class="form-control" required />
          </div>

          <div class="col-12 col-md-6">
            <label for="guests" class="form-label">Guests</label>
            <input id="guests" name="guests" type="number" min="1" value="2" class="form-control" required />
          </div>

          <div class="col-12">
            <label for="note" class="form-label">Note</label>
            <textarea id="note" name="note" class="form-control" rows="3"></textarea>
          </div>

          <div class="col-12">
            <label for="attachment" class="form-label">Attachment</label>
            <input id="attachment" name="attachment" type="file" class="form-control" />
          </div>

          <div class="col-12">
            <button id="booking-submit" type="submit" class="btn btn-dark w-100">Send Request</button>
          </div>
        </div>
      </form>
    </main>
    <div id="app-footer"></div>
    <script type="module" src="../js/pages/bookings.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
