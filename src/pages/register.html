<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="../css/global.css" />
  </head>
  <body>
    <div id="app-header"></div>
    <main class="container py-5">
      <h1 class="mb-4">Register</h1>
      <div id="auth-alert" class="mb-3"></div>
      <form id="register-form" class="row g-3" novalidate>
        <div class="col-12 col-md-8 col-lg-6">
          <label for="email" class="form-label">Email</label>
          <input id="email" name="email" type="email" class="form-control" required />
        </div>
        <div class="col-12 col-md-8 col-lg-6">
          <label for="password" class="form-label">Password</label>
          <input id="password" name="password" type="password" class="form-control" required />
        </div>
        <div class="col-12 col-md-8 col-lg-6">
          <label for="confirm-password" class="form-label">Confirm Password</label>
          <input id="confirm-password" name="confirmPassword" type="password" class="form-control" required />
        </div>
        <div class="col-12">
          <button id="register-submit" type="submit" class="btn btn-primary">Create Account</button>
        </div>
      </form>
    </main>
    <div id="app-footer"></div>
    <script type="module" src="../js/pages/register.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
